<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popover Widget</title>
</head>
<body>
    <div class="container">
        <h1>Popover Example</h1>
        <button class="popover-btn" data-popover="popover1">Click to toggle popever</button>
        
        <div class="popover" id="popover1">
            <div class="popover-header">
                <h3>Popover Title</h3>
                <button class="popover-close">×</button>
            </div>
            <div class="popover-body">
                <p>And here's some amazing content. It's very engaging. Right?</p>
            </div>
        </div>
    </div>
</body>
</html>
